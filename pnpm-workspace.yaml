packages:
  - core
  - backend-a
  - backend-b
  - frontend
allowBuilds:
  '@google/genai': false
  '@mongodb-js/zstd': false
  # postinstall only downloads the optional `bt` CLI binary; the SDK we bundle
  # into the workers doesn't need it.
  braintrust: false
  core-js-pure: false
  esbuild: true
  node-liblzma: false
  protobufjs: false
  sharp: false
  workerd: true
patchedDependencies:
  '@durable-streams/client@0.2.6': patches/@durable-streams__client@0.2.6.patch
